# File: nginx.conf
# Owner: Andrew Holland
# Purpose: Nginx configuration for CAPM Exam Prep, serving static files and proxying API requests
# Version: 1.4 (updated 2025-08-02)
# Change Log:
#   - 2025-08-02: Updated static file serving for /volume1/CAPM_Exam, fixed MIME types (ID: dsm-deployment-20250802-7)
#   - 2025-08-02: Created nginx.conf for DSM deployment, proxying to Flask on port 8085 (ID: dsm-deployment-20250802-2)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(css|js|jpg)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        location /api/ {
            proxy_pass http://flask:8085;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /questions.json {
            return 403;
        }
    }
}